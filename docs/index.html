<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>속보 대시보드</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; color: #1a1a1a; }
  .header { background: #fff; border-bottom: 1px solid #e5e5e5; padding: 14px 20px; position: sticky; top: 0; z-index: 10; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #e24b4a; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .title { font-size: 16px; font-weight: 600; }
  .updated { font-size: 12px; color: #888; }
  .stats { display: flex; gap: 16px; align-items: center; }
  .stat { text-align: center; }
  .stat-val { font-size: 18px; font-weight: 600; line-height: 1; }
  .stat-val.red { color: #e24b4a; }
  .stat-label { font-size: 10px; color: #888; margin-top: 2px; }
  .filters { background: #fff; padding: 10px 20px; border-bottom: 1px solid #e5e5e5; display: flex; gap: 6px; flex-wrap: wrap; }
  .badge { font-size: 12px; padding: 4px 10px; border-radius: 20px; border: 1px solid #ddd; cursor: pointer; color: #555; background: #fff; transition: all 0.15s; user-select: none; }
  .badge:hover { border-color: #aaa; }
  .badge.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }
  .badge.red.active { background: #e24b4a; border-color: #e24b4a; }
  .badge.blue.active { background: #1d4ed8; border-color: #1d4ed8; }
  .news-item.scoop { border-left: 3px solid #1d4ed8; }
  .scoop-tag { font-size: 10px; font-weight: 600; color: #1d4ed8; background: #dbeafe; padding: 1px 6px; border-radius: 3px; }
  .container { max-width: 900px; margin: 0 auto; padding: 16px; }
  .news-list { display: flex; flex-direction: column; gap: 8px; }
  .news-item { background: #fff; border: 1px solid #e5e5e5; border-radius: 10px; padding: 12px 16px; display: flex; gap: 12px; text-decoration: none; color: inherit; transition: border-color 0.15s, box-shadow 0.15s; }
  .news-item:hover { border-color: #bbb; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .news-item.breaking { border-left: 3px solid #e24b4a; }
  .source-tag { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; margin-top: 2px; height: fit-content; }
  .src-yna { background: #dbeafe; color: #1e40af; }
  .src-ytn { background: #fee2e2; color: #991b1b; }
  .src-mbc { background: #dcfce7; color: #166534; }
  .src-kbs { background: #fef3c7; color: #92400e; }
  .src-hankyung { background: #ede9fe; color: #5b21b6; }
  .src-mk { background: #fef3c7; color: #92400e; }
  .src-kmib { background: #ffedd5; color: #9a3412; }
  .src-chosun { background: #d1fae5; color: #065f46; }
  .src-seoul { background: #fce7f3; color: #9d174d; }
  .news-content { flex: 1; min-width: 0; }
  .news-title { font-size: 14px; line-height: 1.5; margin-bottom: 4px; }
  .news-footer { display: flex; align-items: center; gap: 6px; }
  .breaking-tag { font-size: 10px; font-weight: 600; color: #e24b4a; background: #fee2e2; padding: 1px 6px; border-radius: 3px; }
  .news-time { font-size: 11px; color: #999; }
  .empty { text-align: center; padding: 4rem; color: #999; font-size: 14px; }
  .refresh-btn { font-size: 12px; padding: 5px 12px; border-radius: 6px; border: 1px solid #ddd; cursor: pointer; background: #fff; color: #333; }
  .refresh-btn:hover { background: #f5f5f5; }
  .countdown { font-size: 12px; color: #888; }
  @media (max-width: 600px) {
    .stats { gap: 10px; }
    .header { padding: 10px 14px; }
    .container { padding: 10px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="dot"></div>
    <span class="title">속보 대시보드</span>
    <span class="updated" id="updated">불러오는 중...</span>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="stats">
      <div class="stat"><div class="stat-val" id="s-total">—</div><div class="stat-label">총 기사</div></div>
      <div class="stat"><div class="stat-val red" id="s-breaking">—</div><div class="stat-label">속보</div></div>
    </div>
    <span class="countdown" id="countdown"></span>
    <button class="refresh-btn" onclick="loadNews()">↻</button>
  </div>
</div>

<div class="filters">
  <span class="badge active" data-src="all">전체</span>
 <span class="badge red" data-src="breaking-only">🔴 속보/단독</span>
  <span class="badge" data-src="yna">연합뉴스</span>
  <span class="badge" data-src="ytn">YTN</span>
  <span class="badge" data-src="mbc">MBC</span>
  <span class="badge" data-src="kbs">KBS</span>
  <span class="badge" data-src="hankyung">한국경제</span>
  <span class="badge" data-src="mk">매일경제</span>
  <span class="badge" data-src="kmib">국민일보</span>
  <span class="badge" data-src="chosun">조선일보</span>
  <span class="badge" data-src="seoul">서울신문</span>
</div>

<div class="container">
  <div class="news-list" id="news-list"><div class="empty">불러오는 중...</div></div>
</div>

<script>
const SOURCE_NAMES = {yna:'연합뉴스',ytn:'YTN',mbc:'MBC',kbs:'KBS',hankyung:'한국경제',mk:'매일경제',kmib:'국민일보',chosun:'조선일보',seoul:'서울신문'};
let allItems = [];
let activeFilter = 'all';
let countdown = 300;
let cdTimer;

function timeAgo(dateStr) {
  const d = Math.floor((Date.now() - new Date(dateStr)) / 60000);
  if (d < 1) return '방금 전';
  if (d < 60) return d + '분 전';
  const h = Math.floor(d / 60);
  if (h < 24) return h + '시간 전';
  return Math.floor(h / 24) + '일 전';
}

function render() {
  const list = document.getElementById('news-list');
  let items = allItems;
  if (activeFilter === 'breaking-only') items = items.filter(i => i.is_breaking || i.is_scoop);
  else if (activeFilter !== 'all') items = items.filter(i => i.source_id === activeFilter);

  document.getElementById('s-total').textContent = allItems.length;
  document.getElementById('s-breaking').textContent = allItems.filter(i => i.is_breaking).length;

  if (!items.length) {
    list.innerHTML = '<div class="empty">표시할 뉴스가 없습니다</div>';
    return;
  }

  list.innerHTML = items.map(item => {
    const cls = item.is_breaking ? ' breaking' : item.is_scoop ? ' scoop' : '';
    return `
    <a class="news-item${cls}" href="${item.link}" target="_blank" rel="noopener">
      <span class="source-tag src-${item.source_id}">${SOURCE_NAMES[item.source_id] || item.source_id}</span>
      <div class="news-content">
        <div class="news-title">${item.title}</div>
        <div class="news-footer">
          ${item.is_breaking ? '<span class="breaking-tag">속보</span>' : ''}
          ${item.is_scoop ? '<span class="scoop-tag">단독</span>' : ''}
          <span class="news-time">${timeAgo(item.pub_date)}</span>
        </div>
      </div>
    </a>`;
  }).join('');
}

async function loadNews() {
  try {
    const res = await fetch(`news.json?t=${Date.now()}`);
    const data = await res.json();
    allItems = data.items || [];
    document.getElementById('updated').textContent = data.updated + ' 업데이트';
    render();
    resetCountdown();
  } catch(e) {
    document.getElementById('news-list').innerHTML = '<div class="empty">뉴스를 불러올 수 없습니다.<br>잠시 후 다시 시도해주세요.</div>';
  }
}

function resetCountdown() {
  clearInterval(cdTimer);
  countdown = 300;
  cdTimer = setInterval(() => {
    countdown--;
    const m = Math.floor(countdown / 60), s = countdown % 60;
    document.getElementById('countdown').textContent = `${m}:${String(s).padStart(2,'0')} 후 갱신`;
    if (countdown <= 0) loadNews();
  }, 1000);
}

document.querySelectorAll('.badge').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.badge').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    activeFilter = b.dataset.src;
    render();
  });
});

loadNews();
</script>
</body>
</html>
