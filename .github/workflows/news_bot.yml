name: 속보 뉴스 봇

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install feedparser requests

      - name: seen_links 캐시 복원
        uses: actions/cache@v4
        with:
          path: seen_links.json
          key: seen-links-${{ github.run_id }}
          restore-keys: |
            seen-links-

      - name: 뉴스 봇 실행
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python news_bot.py

      - name: news.json 커밋 & 푸시
        run: |
          git config user.name "news-bot"
          git config user.email "bot@github.com"
          git add docs/news.json
          git diff --staged --quiet || git commit -m "update news.json"
          git push

      - name: seen_links 저장
        uses: actions/cache/save@v4
        if: always()
        with:
          path: seen_links.json
          key: seen-links-${{ github.run_id }}
